{% load static %}
<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Inter;background:#F5F7FB;padding:20px;text-align:center}
.card{background:#fff;padding:20px;border-radius:20px}
.upload{border:2px dashed #E5E7EB;padding:30px;border-radius:16px;cursor:pointer}
.btn{margin-top:20px;width:100%;padding:12px;background:#1E3A8A;color:#fff;border:none;border-radius:28px}
.badge{margin-top:10px;background:#F3F4F6;padding:6px 12px;border-radius:20px}
</style>
</head>

<body>

<h2>DocShare</h2>
<h3>Secure Upload</h3>

<form method="POST" action="/upload/" enctype="multipart/form-data">
{% csrf_token %}

<div class="card">
    <div class="upload" onclick="pick()">
        <input type="file" name="document" id="file" hidden>
        <p id="text"> uploadDocuments</p>
    </div>

    <div class="badge">🔒 AES-256 ENCRYPTED</div>
</div>

<button class="btn">Generate QR</button>

</form>

<script>
function pick(){document.getElementById("file").click();}
document.getElementById("file").onchange=function(){
    document.getElementById("text").innerText=this.files[0].name;
}
</script>

</body>
</html>
