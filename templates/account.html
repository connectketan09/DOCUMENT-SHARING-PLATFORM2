{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Account</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <h2>DocShare</h2>
</header>

<div class="container">
    
    <h1>👤 Account</h1>
    <p>Upload and manage your files</p>

    <!-- ✅ Upload form -->
    <div class="upload-box">
        <form action="/upload/" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="document" required>
            <br><br>
            <button type="submit" class="qr-btn">Upload File</button>
        </form>
    </div>

    <br>

    <!-- ✅ File list -->
    <div class="upload-box">
        <h3>Your Files</h3>

        {% if files %}
            {% for file in files %}
                {% if not file.startswith('qr_') %}
                    <p>{{ file }}</p>
                    <a href="/download/{{ file }}" class="qr-btn">Download</a>
                    <br><br>
                {% endif %}
            {% endfor %}
        {% else %}
            <p>No files uploaded yet</p>
        {% endif %}
    </div>

</div>

</body>
</html>
